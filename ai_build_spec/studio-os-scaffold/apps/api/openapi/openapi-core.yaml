openapi: 3.1.0
info:
  title: StudioOS for Interiors API
  version: 1.0.0
  summary: Geometry-first interior design operating system API
  description: |
    API contract for a revision-safe, AI-assisted interior design platform.

    Core principle:
    - Every important output must link back to project + scene version + source entities.
    - No endpoint should create business-critical side effects without version traceability.
servers:
  - url: https://api.example.com/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Auth
  - name: Leads
  - name: Projects
  - name: Intake
  - name: Assets
  - name: Floor Plans
  - name: Scenes
  - name: Modules
  - name: Rules
  - name: Materials
  - name: Pricing
  - name: Renders
  - name: Drawings
  - name: Proposals
  - name: Approvals
  - name: Production
  - name: Comments
  - name: Jobs

paths:
  /me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUserContext'

  /leads:
    post:
      tags: [Leads]
      operationId: createLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeadRequest'
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeLead'

  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      parameters:
        - in: query
          name: stage
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Projects list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProjectList'
    post:
      tags: [Projects]
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProject'

  /projects/{projectId}:
    get:
      tags: [Projects]
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProjectSummary'
    patch:
      tags: [Projects]
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProject'

  /projects/{projectId}/timeline:
    get:
      tags: [Projects]
      operationId: getProjectTimeline
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Timeline and stage events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProjectTimeline'

  /projects/{projectId}/intake/current:
    get:
      tags: [Intake]
      operationId: getCurrentIntake
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Current intake package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeIntakePackage'

  /projects/{projectId}/intake:
    post:
      tags: [Intake]
      operationId: saveIntake
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveIntakeRequest'
      responses:
        '201':
          description: Intake package saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeIntakePackage'

  /projects/{projectId}/intake/complete:
    post:
      tags: [Intake]
      operationId: completeIntake
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Intake marked complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProjectSummary'

  /projects/{projectId}/assets/upload:
    post:
      tags: [Assets]
      operationId: uploadAsset
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [assetType, file]
              properties:
                assetType:
                  type: string
                roomRef:
                  type: string
                wallRef:
                  type: string
                sourceEntityType:
                  type: string
                sourceEntityId:
                  type: string
                  format: uuid
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Asset uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAsset'

  /projects/{projectId}/floor-plan/interpret:
    post:
      tags: [Floor Plans]
      operationId: interpretFloorPlan
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterpretFloorPlanRequest'
      responses:
        '202':
          description: Interpretation job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobReference'

  /projects/{projectId}/floor-plan/versions:
    get:
      tags: [Floor Plans]
      operationId: listFloorPlanVersions
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Floor plan versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeFloorPlanVersionList'

  /floor-plan-versions/{versionId}:
    get:
      tags: [Floor Plans]
      operationId: getFloorPlanVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Floor plan version detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeFloorPlanVersion'

  /floor-plan-versions/{versionId}/review:
    post:
      tags: [Floor Plans]
      operationId: reviewFloorPlanVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewFloorPlanRequest'
      responses:
        '200':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeFloorPlanVersion'

  /floor-plan-versions/{versionId}/finalize:
    post:
      tags: [Floor Plans]
      operationId: finalizeFloorPlanVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
      responses:
        '201':
          description: Spatial model version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSpatialModelVersion'

  /projects/{projectId}/scenes/from-spatial-model:
    post:
      tags: [Scenes]
      operationId: createSceneFromSpatialModel
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spatialModelVersionId]
              properties:
                spatialModelVersionId:
                  type: string
                  format: uuid
                branchName:
                  type: string
                  default: main
      responses:
        '201':
          description: Scene created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSceneVersion'

  /projects/{projectId}/scenes:
    get:
      tags: [Scenes]
      operationId: listScenes
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Scene versions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSceneVersionList'

  /scenes/{sceneVersionId}:
    get:
      tags: [Scenes]
      operationId: getScene
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      responses:
        '200':
          description: Scene detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSceneVersion'

  /scenes/{sceneVersionId}/branch:
    post:
      tags: [Scenes]
      operationId: branchScene
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branchName]
              properties:
                branchName:
                  type: string
                reason:
                  type: string
      responses:
        '201':
          description: Scene branch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSceneVersion'

  /scenes/{sceneVersionId}/patch:
    post:
      tags: [Scenes]
      operationId: patchScene
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenePatchRequest'
      responses:
        '201':
          description: New scene version created after patch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSceneVersion'

  /scenes/{sceneVersionId}/lock:
    post:
      tags: [Scenes]
      operationId: lockScene
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                lockReason:
                  type: string
      responses:
        '200':
          description: Scene locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSceneVersion'

  /module-templates:
    get:
      tags: [Modules]
      operationId: listModuleTemplates
      parameters:
        - in: query
          name: roomType
          schema: { type: string }
        - in: query
          name: moduleType
          schema: { type: string }
      responses:
        '200':
          description: Module templates list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeModuleTemplateList'

  /scenes/{sceneVersionId}/modules:
    post:
      tags: [Modules]
      operationId: placeModule
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceModuleRequest'
      responses:
        '201':
          description: Module placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeModule'

  /modules/{moduleId}:
    patch:
      tags: [Modules]
      operationId: updateModule
      parameters:
        - $ref: '#/components/parameters/ModuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModuleRequest'
      responses:
        '200':
          description: Module updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeModule'

  /modules/{moduleId}/validate:
    post:
      tags: [Rules]
      operationId: validateModule
      parameters:
        - $ref: '#/components/parameters/ModuleId'
      responses:
        '200':
          description: Module validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRuleEvaluation'

  /scenes/{sceneVersionId}/validate:
    post:
      tags: [Rules]
      operationId: validateScene
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      responses:
        '200':
          description: Scene validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSceneValidation'

  /material-catalog:
    get:
      tags: [Materials]
      operationId: listMaterialCatalog
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: brand
          schema: { type: string }
        - in: query
          name: roomType
          schema: { type: string }
      responses:
        '200':
          description: Materials list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMaterialCatalogList'

  /scenes/{sceneVersionId}/pricing/generate:
    post:
      tags: [Pricing]
      operationId: generatePricingSet
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePricingRequest'
      responses:
        '202':
          description: Pricing job queued or created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobReference'

  /projects/{projectId}/pricing-sets:
    get:
      tags: [Pricing]
      operationId: listPricingSets
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Pricing sets list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePricingSetList'

  /scenes/{sceneVersionId}/render-sets:
    post:
      tags: [Renders]
      operationId: createRenderSet
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRenderSetRequest'
      responses:
        '202':
          description: Render set job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRenderSet'

  /render-sets/{renderSetId}:
    get:
      tags: [Renders]
      operationId: getRenderSet
      parameters:
        - $ref: '#/components/parameters/RenderSetId'
      responses:
        '200':
          description: Render set detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRenderSet'

  /render-variants/{variantId}/approve:
    post:
      tags: [Renders]
      operationId: approveRenderVariant
      parameters:
        - $ref: '#/components/parameters/VariantId'
      responses:
        '200':
          description: Render variant approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRenderVariant'

  /render-variants/{variantId}/reject:
    post:
      tags: [Renders]
      operationId: rejectRenderVariant
      parameters:
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Render variant rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRenderVariant'

  /scenes/{sceneVersionId}/drawing-sets:
    post:
      tags: [Drawings]
      operationId: createDrawingSet
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDrawingSetRequest'
      responses:
        '202':
          description: Drawing generation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeDrawingSet'

  /drawing-sets/{drawingSetId}:
    get:
      tags: [Drawings]
      operationId: getDrawingSet
      parameters:
        - $ref: '#/components/parameters/DrawingSetId'
      responses:
        '200':
          description: Drawing set detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeDrawingSet'

  /projects/{projectId}/proposal-sets:
    post:
      tags: [Proposals]
      operationId: createProposalSet
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposalSetRequest'
      responses:
        '201':
          description: Proposal set created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProposalSet'
    get:
      tags: [Proposals]
      operationId: listProposalSets
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Proposal sets list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeProposalSetList'

  /proposal-sets/{proposalSetId}/export:
    post:
      tags: [Proposals]
      operationId: exportProposalSet
      parameters:
        - $ref: '#/components/parameters/ProposalSetId'
      responses:
        '202':
          description: Proposal export queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobReference'

  /projects/{projectId}/approval-packages:
    post:
      tags: [Approvals]
      operationId: createApprovalPackage
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalPackageRequest'
      responses:
        '201':
          description: Approval package created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeApprovalPackage'

  /approval-packages/{approvalPackageId}:
    get:
      tags: [Approvals]
      operationId: getApprovalPackage
      parameters:
        - $ref: '#/components/parameters/ApprovalPackageId'
      responses:
        '200':
          description: Approval package detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeApprovalPackage'

  /approval-packages/{approvalPackageId}/submit-client-decision:
    post:
      tags: [Approvals]
      operationId: submitApprovalDecision
      parameters:
        - $ref: '#/components/parameters/ApprovalPackageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Approval decision recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeApprovalPackage'

  /scenes/{sceneVersionId}/bom-sets:
    post:
      tags: [Production]
      operationId: generateBomSet
      parameters:
        - $ref: '#/components/parameters/SceneVersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateBomRequest'
      responses:
        '202':
          description: BOM generation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobReference'

  /bom-sets/{bomSetId}/cutlist-sets:
    post:
      tags: [Production]
      operationId: generateCutlistSet
      parameters:
        - $ref: '#/components/parameters/BomSetId'
      responses:
        '202':
          description: Cutlist generation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobReference'

  /cutlist-sets/{cutlistSetId}:
    get:
      tags: [Production]
      operationId: getCutlistSet
      parameters:
        - $ref: '#/components/parameters/CutlistSetId'
      responses:
        '200':
          description: Cutlist set detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCutlistSet'

  /comments:
    post:
      tags: [Comments]
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeComment'

  /projects/{projectId}/comments:
    get:
      tags: [Comments]
      operationId: listComments
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCommentList'

  /jobs/{jobId}:
    get:
      tags: [Jobs]
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJob'

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VersionId:
      name: versionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SceneVersionId:
      name: sceneVersionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ModuleId:
      name: moduleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RenderSetId:
      name: renderSetId
      in: path
      required: true
      schema: { type: string, format: uuid }
    DrawingSetId:
      name: drawingSetId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProposalSetId:
      name: proposalSetId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ApprovalPackageId:
      name: approvalPackageId
      in: path
      required: true
      schema: { type: string, format: uuid }
    BomSetId:
      name: bomSetId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CutlistSetId:
      name: cutlistSetId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VariantId:
      name: variantId
      in: path
      required: true
      schema: { type: string, format: uuid }
    JobId:
      name: jobId
      in: path
      required: true
      schema: { type: string, format: uuid }

  schemas:
    EnvelopeBase:
      type: object
      properties:
        success:
          type: boolean
        meta:
          type: object
          additionalProperties: true
        error:
          anyOf:
            - type: 'null'
            - $ref: '#/components/schemas/ErrorObject'
      required: [success, meta, error]

    ErrorObject:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [code, message]

    UUIDObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required: [id]

    UserContext:
      type: object
      properties:
        id: { type: string, format: uuid }
        studioId: { type: string, format: uuid }
        role: { type: string }
        fullName: { type: string }
        email: { type: string }
      required: [id, studioId, role, fullName]

    Lead:
      type: object
      properties:
        id: { type: string, format: uuid }
        contactName: { type: string }
        phone: { type: string }
        email: { type: string }
        city: { type: string }
        source: { type: string }
        status: { type: string }
        projectType: { type: string }
        budgetBand: { type: string }
      required: [id, contactName, source, status]

    CreateLeadRequest:
      type: object
      required: [contactName, source]
      properties:
        contactName: { type: string }
        phone: { type: string }
        email: { type: string }
        city: { type: string }
        source: { type: string }
        projectType: { type: string }
        budgetBand: { type: string }
        urgencyLevel: { type: string, enum: [low, medium, high] }
        notes: { type: string }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectCode: { type: string }
        name: { type: string }
        stage: { type: string }
        status: { type: string }
        budgetBand: { type: string }
        clientId: { type: string, format: uuid }
      required: [id, projectCode, name, stage, status, clientId]

    ProjectSummary:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            readiness:
              $ref: '#/components/schemas/Readiness'
