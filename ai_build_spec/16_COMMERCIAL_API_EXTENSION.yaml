openapi: 3.1.0
info:
  title: StudioOS for Interiors Commercial API Extension
  version: 1.0.0
  summary: Budget, estimate, quotation, billing, payment, procurement, and variation endpoints
servers:
  - url: https://api.example.com/api/v1
    description: Production

paths:
  /projects/{projectId}/budget-profiles:
    post:
      tags: [Commercial]
      summary: Create or version a budget profile
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetProfileRequest'
      responses:
        '201':
          description: Budget profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeBudgetProfile'

  /projects/{projectId}/estimate-sets:
    post:
      tags: [Commercial]
      summary: Create estimate / quote version
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEstimateSetRequest'
      responses:
        '201':
          description: Estimate set created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeEstimateSet'
    get:
      tags: [Commercial]
      summary: List estimate / quote versions
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Estimate sets list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeEstimateSetList'

  /estimate-sets/{estimateSetId}/approve:
    post:
      tags: [Commercial]
      summary: Approve an estimate / quotation version
      parameters:
        - name: estimateSetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Estimate approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeEstimateSet'

  /estimate-sets/{estimateSetId}/payment-plan:
    post:
      tags: [Commercial]
      summary: Create payment plan from approved quote
      parameters:
        - name: estimateSetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentPlanRequest'
      responses:
        '201':
          description: Payment plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePaymentPlan'

  /payment-plans/{paymentPlanId}/invoices:
    post:
      tags: [Commercial]
      summary: Create invoice under payment plan
      parameters:
        - name: paymentPlanId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeInvoice'

  /projects/{projectId}/invoices:
    get:
      tags: [Commercial]
      summary: List project invoices
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeInvoiceList'

  /projects/{projectId}/payments:
    post:
      tags: [Commercial]
      summary: Record payment received
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePayment'

  /projects/{projectId}/variation-orders:
    post:
      tags: [Commercial]
      summary: Create a variation / change order
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVariationOrderRequest'
      responses:
        '201':
          description: Variation order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeVariationOrder'

  /projects/{projectId}/purchase-orders:
    post:
      tags: [Commercial]
      summary: Create vendor purchase order
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseOrderRequest'
      responses:
        '201':
          description: Purchase order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePurchaseOrder'
    get:
      tags: [Commercial]
      summary: List purchase orders
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Purchase order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePurchaseOrderList'

components:
  schemas:
    EnvelopeBase:
      type: object
      properties:
        success: { type: boolean }
        data: {}
        meta:
          type: object
          additionalProperties: true
        error:
          anyOf:
            - type: 'null'
            - type: object
              properties:
                code: { type: string }
                message: { type: string }
      required: [success, data, meta, error]

    BudgetProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        versionNumber: { type: integer }
        isCurrent: { type: boolean }
        budgetBand: { type: string }
        targetBudget: { type: number }
        maxBudget: { type: number }
        scopeType: { type: string }
        financingNeeded: { type: boolean }
        priorities:
          type: object
          additionalProperties: true
        preferences:
          type: object
          additionalProperties: true
      required: [id, projectId, versionNumber, isCurrent, budgetBand, scopeType, financingNeeded]

    CreateBudgetProfileRequest:
      type: object
      required: [budgetBand, scopeType, financingNeeded]
      properties:
        budgetBand: { type: string }
        targetBudget: { type: number }
        maxBudget: { type: number }
        scopeType: { type: string }
        financingNeeded: { type: boolean }
        priorities:
          type: object
          additionalProperties: true
        preferences:
          type: object
          additionalProperties: true

    EstimateLineItem:
      type: object
      properties:
        lineCode: { type: string }
        roomRef: { type: string }
        moduleRef: { type: string }
        category: { type: string }
        description: { type: string }
        quantity: { type: number }
        uom: { type: string }
        baseRate: { type: number }
        marginRate: { type: number }
        lineTotal: { type: number }
        metadata:
          type: object
          additionalProperties: true
      required: [lineCode, category, description, quantity, uom, baseRate, marginRate, lineTotal]

    EstimateSet:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        sceneVersionId: { type: string, format: uuid }
        budgetProfileId: { type: string, format: uuid }
        estimateType: { type: string }
        versionNumber: { type: integer }
        status: { type: string }
        assumptions:
          type: object
          additionalProperties: true
        summary:
          type: object
          additionalProperties: true
        totals:
          type: object
          additionalProperties: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/EstimateLineItem'
      required: [id, projectId, estimateType, versionNumber, status, items]

    CreateEstimateSetRequest:
      type: object
      required: [estimateType]
      properties:
        sceneVersionId: { type: string, format: uuid }
        budgetProfileId: { type: string, format: uuid }
        estimateType: { type: string }
        assumptions:
          type: object
          additionalProperties: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/EstimateLineItem'

    PaymentPlanMilestone:
      type: object
      properties:
        milestoneKey: { type: string }
        milestoneLabel: { type: string }
        dueType: { type: string, enum: [event, date] }
        dueEvent: { type: string }
        dueDate: { type: string, format: date }
        percentOfTotal: { type: number }
        fixedAmount: { type: number }
        sequenceNo: { type: integer }
        status: { type: string }
      required: [milestoneKey, milestoneLabel, dueType, sequenceNo]

    PaymentPlan:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        name: { type: string }
        versionNumber: { type: integer }
        status: { type: string }
        totalContractValue: { type: number }
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/PaymentPlanMilestone'
      required: [id, projectId, name, versionNumber, status, totalContractValue, milestones]

    CreatePaymentPlanRequest:
      type: object
      required: [name, totalContractValue, milestones]
      properties:
        estimateSetId: { type: string, format: uuid }
        name: { type: string }
        totalContractValue: { type: number }
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/PaymentPlanMilestone'

    InvoiceLineItem:
      type: object
      properties:
        lineCode: { type: string }
        category: { type: string }
        description: { type: string }
        quantity: { type: number }
        uom: { type: string }
        taxableValue: { type: number }
        taxRate: { type: number }
        taxAmount: { type: number }
        lineTotal: { type: number }
      required: [category, description, quantity, uom, taxableValue, taxRate, taxAmount, lineTotal]

    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        invoiceType: { type: string }
        invoiceNumber: { type: string }
        issueDate: { type: string, format: date }
        dueDate: { type: string, format: date }
        status: { type: string }
        subtotal: { type: number }
        taxTotal: { type: number }
        grandTotal: { type: number }
        balanceDue: { type: number }
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
      required: [id, projectId, invoiceType, invoiceNumber, issueDate, status, subtotal, taxTotal, grandTotal, balanceDue, lineItems]

    CreateInvoiceRequest:
      type: object
      required: [invoiceType, issueDate, lineItems]
      properties:
        estimateSetId: { type: string, format: uuid }
        milestoneId: { type: string, format: uuid }
        invoiceType: { type: string }
        issueDate: { type: string, format: date }
        dueDate: { type: string, format: date }
        currencyCode: { type: string }
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'

    PaymentAllocation:
      type: object
      properties:
        invoiceId: { type: string, format: uuid }
        allocatedAmount: { type: number }
      required: [invoiceId, allocatedAmount]

    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        amount: { type: number }
        paymentMethod: { type: string }
        paymentDate: { type: string, format: date }
        referenceNo: { type: string }
        status: { type: string }
        allocations:
          type: array
          items:
            $ref: '#/components/schemas/PaymentAllocation'
      required: [id, projectId, amount, paymentMethod, paymentDate, status, allocations]

    RecordPaymentRequest:
      type: object
      required: [amount, paymentMethod, paymentDate, allocations]
      properties:
        paymentPlanId: { type: string, format: uuid }
        amount: { type: number }
        paymentMethod: { type: string }
        paymentDate: { type: string, format: date }
        referenceNo: { type: string }
        notes: { type: string }
        allocations:
          type: array
          items:
            $ref: '#/components/schemas/PaymentAllocation'

    VariationOrder:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        variationCode: { type: string }
        status: { type: string }
        reasonCategory: { type: string }
        description: { type: string }
        costDelta: { type: number }
        timelineDeltaDays: { type: integer }
      required: [id, projectId, variationCode, status, reasonCategory, description, costDelta]

    CreateVariationOrderRequest:
      type: object
      required: [reasonCategory, description, costDelta]
      properties:
        sceneVersionId: { type: string, format: uuid }
        sourceEstimateSetId: { type: string, format: uuid }
        revisedEstimateSetId: { type: string, format: uuid }
        reasonCategory: { type: string }
        description: { type: string }
        costDelta: { type: number }
        timelineDeltaDays: { type: integer }
        metadata:
          type: object
          additionalProperties: true

    PurchaseOrderLine:
      type: object
      properties:
        lineCode: { type: string }
        roomRef: { type: string }
        moduleRef: { type: string }
        itemDescription: { type: string }
        quantity: { type: number }
        uom: { type: string }
        unitRate: { type: number }
        lineTotal: { type: number }
      required: [itemDescription, quantity, uom, unitRate, lineTotal]

    PurchaseOrder:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        vendorName: { type: string }
        poNumber: { type: string }
        category: { type: string }
        status: { type: string }
        expectedDeliveryDate: { type: string, format: date }
        subtotal: { type: number }
        taxTotal: { type: number }
        grandTotal: { type: number }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrderLine'
      required: [id, projectId, vendorName, poNumber, category, status, subtotal, taxTotal, grandTotal, lines]

    CreatePurchaseOrderRequest:
      type: object
      required: [vendorName, category, lines]
      properties:
        vendorName: { type: string }
        category: { type: string }
        expectedDeliveryDate: { type: string, format: date }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrderLine'
        metadata:
          type: object
          additionalProperties: true

    EnvelopeBudgetProfile:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/BudgetProfile' }
          required: [data]

    EnvelopeEstimateSet:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/EstimateSet' }
          required: [data]

    EnvelopeEstimateSetList:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/EstimateSet' }
          required: [data]

    EnvelopePaymentPlan:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/PaymentPlan' }
          required: [data]

    EnvelopeInvoice:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Invoice' }
          required: [data]

    EnvelopeInvoiceList:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Invoice' }
          required: [data]

    EnvelopePayment:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Payment' }
          required: [data]

    EnvelopeVariationOrder:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/VariationOrder' }
          required: [data]

    EnvelopePurchaseOrder:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/PurchaseOrder' }
          required: [data]

    EnvelopePurchaseOrderList:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/PurchaseOrder' }
          required: [data]
