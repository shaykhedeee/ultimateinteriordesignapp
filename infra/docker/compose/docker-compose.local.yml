version: "3.9"

name: ai-workspace-platform

services:
  postgres:
    image: postgres:16
    container_name: platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  minio:
    image: minio/minio:latest
    container_name: platform-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  api:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/api.Dockerfile
    image: ai-workspace-api:local
    container_name: platform-api
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - core
    networks:
      - platform-net
    command: ["sh", "-c", "pnpm --filter api start"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/worker.Dockerfile
    image: ai-workspace-worker:local
    container_name: platform-worker
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - core
    networks:
      - platform-net
    command: ["sh", "-c", "pnpm --filter worker start"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker.healthy || (sleep 1 && touch /tmp/worker.healthy)" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/web.Dockerfile
    image: ai-workspace-web:local
    container_name: platform-web
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - core
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vision-python:
    build:
      context: ../../services/vision-python
      dockerfile: Dockerfile
    image: ai-workspace-vision:local
    container_name: platform-vision
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - ai
    networks:
      - platform-net

  inference-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/inference-gateway.Dockerfile
    image: ai-workspace-inference-gateway:local
    container_name: platform-inference-gateway
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://host.docker.internal:11434
      PORT: 7000
    ports:
      - "7000:7000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - ai
    networks:
      - platform-net

  prometheus:
    image: prom/prometheus:latest
    container_name: platform-prometheus
    restart: unless-stopped
    volumes:
      - ../../infra/monitoring/prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    profiles:
      - monitoring
    networks:
      - platform-net

  grafana:
    image: grafana/grafana:latest
    container_name: platform-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infra/monitoring/grafana:/etc/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    profiles:
      - monitoring
    networks:
      - platform-net

  loki:
    image: grafana/loki:latest
    container_name: platform-loki
    restart: unless-stopped
    volumes:
      - ../../infra/monitoring/loki:/etc/loki
    ports:
      - "3100:3100"
    profiles:
      - monitoring
    networks:
      - platform-net

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/admin.Dockerfile
    image: ai-workspace-admin:local
    container_name: platform-admin
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "3002:3000"
    profiles:
      - admin
    networks:
      - platform-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:

networks:
  platform-net:
    driver: bridge
